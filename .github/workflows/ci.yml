name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint client
        run: npm run lint --workspace=client

      - name: Lint server
        run: npm run lint --workspace=server

      - name: Type check client
        run: npx tsc --noEmit --project client/tsconfig.json

      - name: Type check server
        run: npx tsc --noEmit --project server/tsconfig.json

  test-gpu-worker:
    name: GPU Worker Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gpu-worker/requirements.txt

      - name: Install dependencies
        run: |
          cd gpu-worker
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd gpu-worker
          python -m pytest tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build client
        run: npm run build --workspace=client

      - name: Build server
        run: npm run build --workspace=server
